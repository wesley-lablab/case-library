<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>数据迁移工具</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-top: 0;
    }
    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #d03e56;
    }
    .success {
      color: #10b981;
      background: #d1fae5;
      padding: 12px;
      border-radius: 8px;
      margin: 10px 0;
    }
    .info {
      color: #3b82f6;
      background: #dbeafe;
      padding: 12px;
      border-radius: 8px;
      margin: 10px 0;
    }
    textarea {
      width: 100%;
      min-height: 200px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: monospace;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 数据迁移工具</h1>
    <p class="info">这个工具帮助你把浏览器本地的数据迁移到服务器共享数据中。</p>
    
    <div id="step1">
      <h2>步骤 1：导出当前数据</h2>
      <button onclick="exportData()">从浏览器导出数据</button>
    </div>
    
    <div id="step2" style="display: none;">
      <h2>步骤 2：复制数据</h2>
      <textarea id="dataOutput" readonly></textarea>
      <button onclick="copyData()">复制到剪贴板</button>
      <h2>步骤 3：在服务器电脑上运行</h2>
      <p class="info">在运行服务器的电脑上打开这个页面，粘贴数据并点击"导入到服务器"</p>
      <textarea id="dataInput" placeholder="粘贴数据到这里..."></textarea>
      <button onclick="importData()">导入到服务器</button>
    </div>
    
    <div id="result"></div>
  </div>

  <script>
    const STORAGE_KEY = 'cts-case-library-cases';
    
    function exportData() {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        document.getElementById('dataOutput').value = data;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('result').innerHTML = '<div class="success">✅ 数据已导出！</div>';
      } else {
        document.getElementById('result').innerHTML = '<div class="info">未找到浏览器中的数据。</div>';
      }
    }
    
    function copyData() {
      const textarea = document.getElementById('dataOutput');
      textarea.select();
      document.execCommand('copy');
      document.getElementById('result').innerHTML = '<div class="success">✅ 已复制到剪贴板！</div>';
    }
    
    async function importData() {
      const dataStr = document.getElementById('dataInput').value;
      if (!dataStr) {
        document.getElementById('result').innerHTML = '<div class="info">请先粘贴数据。</div>';
        return;
      }
      
      try {
        const cases = JSON.parse(dataStr);
        const response = await fetch('/api/cases', {
          method: 'GET'
        });
        const existingCases = await response.json();
        
        for (const c of cases) {
          const exists = existingCases.find(e => e.id === c.id);
          if (!exists) {
            await fetch('/api/cases', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(c)
            });
          }
        }
        
        document.getElementById('result').innerHTML = '<div class="success">✅ 数据已导入服务器！现在所有电脑都可以共享数据了。</div>';
      } catch (e) {
        document.getElementById('result').innerHTML = '<div class="info">导入失败：' + e.message + '</div>';
      }
    }
  </script>
</body>
</html>
